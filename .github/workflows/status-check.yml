name: Update status data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: status-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check services and update history
        env:
          S9LAB_BACKEND_URL: ${{ vars.S9LAB_BACKEND_URL }}
          S9LAB_API_VERSION: v1
          STATUS_TIMEOUT_MS: 12000
        run: node scripts/check-status.mjs

      - name: Commit changed status files
        run: |
          if git diff --quiet -- data/status.json data/incidents.json; then
            echo "No status changes to commit"
            exit 0
          fi
          git config user.name "s9lab-status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/status.json data/incidents.json
          git commit -m "chore(status): update service status"
          git push
